<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio Command Center | Live Ops</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to our separated CSS file -->
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <nav id="sidebar">
      <div class="brand-header">
        <div class="live-pulse"></div>
        Ops Command
      </div>

      <div class="sidebar-section">
        <div class="section-title">Display Settings</div>
        <label class="checkbox-label">
          <div class="checkbox-inner">
            <input
              type="checkbox"
              onchange="
                document.body.classList.toggle('compact-mode', this.checked)
              "
            />
            Compact Data View
          </div>
        </label>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Alert Keywords</div>
        <input
          type="text"
          id="new-keyword"
          placeholder="Add keyword + Enter"
          onkeypress="addKeyword(event)"
          class="search-input"
          style="margin-bottom: 12px"
        />
        <div
          id="keyword-list"
          style="display: flex; flex-wrap: wrap; gap: 6px"
        ></div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Global Time Filter</div>
        <select
          id="filter-start"
          class="search-input"
          aria-label="Start Time"
        ></select>
        <select
          id="filter-end"
          class="search-input"
          aria-label="End Time"
        ></select>
        <div style="display: flex; gap: 8px">
          <button class="btn" style="flex: 1" onclick="applyTimeFilter()">
            Filter
          </button>
          <button
            class="btn"
            style="flex: 1; background: transparent"
            onclick="clearTimeFilter()"
          >
            Clear
          </button>
        </div>
      </div>

      <div class="sidebar-section" style="flex: 1">
        <div class="section-title">Active Feeds</div>
        <div class="toggle-group" id="channel-toggles"></div>
      </div>

      <button class="btn btn-primary" onclick="exportCSV()">
        <svg
          width="16"
          height="16"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
          ></path>
        </svg>
        Export CSV Log
      </button>
    </nav>

    <main id="dashboard"></main>
    <div id="toast-container"></div>

    <!-- Link to our separated JS file -->
    <script src="/static/js/app.js"></script>
  </body>
</html>
